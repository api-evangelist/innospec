provider: Innospec
providerId: innospec
created: '2026-05-04'
modified: '2026-05-05'
reconciled: false
tags:
  - Specialty Chemicals
  - Fuel Additives
description: Innospec is a global specialty chemistry company (NASDAQ:IOSP) selling chemical additives,
  formulations, and ingredients into agrochemicals, construction, fuel additives, oilfield services,
  personal care, metal extraction, and polymers/waxes. Innospec does not offer a public commercial API
  product; sales are handled B2B through sales offices and distributors. No public per-call pricing
  applies.
notes: Innospec is not an API provider. The repo is retained as a profile of the company; this artifact
  describes the absence of a public API rather than fabricating a tier structure.
sources:
  - https://www.innospec.com/
plans:
  - id: innospec-not-applicable
    name: Not Applicable — No Public API
    type: enterprise
    description: Innospec does not publish a commercial API product. Customer engagement happens through
      B2B sales (sample request, distributor network) rather than an API tier.
    entries:
      - label: Sample / quote request
        description: Engagement starts with a product sample request via Innospec sales
        name: sample_request
        type: subscription
        metric: contract
        limit: -1
        timeFrame: usage
        geo: global
        domains: []
        unit: 1
        price: contact sales
        userMultiplied: false
    elements:
      - name: B2B sales engagement
      - name: Distributor network
      - name: Product sample program
